# Copy to deploy/k8s/secret.yaml (gitignored) and replace placeholders.
# Generate the token secret with: openssl rand -hex 32
apiVersion: v1
kind: Secret
metadata:
  name: ultraprocessed-secrets
  namespace: ultraprocessed
type: Opaque
stringData:
  ULTRAPROCESSED_TOKEN_SECRET: "REPLACE-ME-with-openssl-rand-hex-32"
  # Optional: route LLM analysis through the backend instead of from the
  # phone. Uncomment + populate one of the following.
  # ULTRAPROCESSED_RELAY_ANTHROPIC_API_KEY: "sk-ant-..."
  # ULTRAPROCESSED_RELAY_OPENAI_COMPATIBLE_API_KEY: "sk-..."
  # ULTRAPROCESSED_RELAY_OPENAI_COMPATIBLE_BASE_URL: "https://api.openai.com/v1"
