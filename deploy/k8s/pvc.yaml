apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ultraprocessed-data
  namespace: ultraprocessed
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # K3s default storageClass is `local-path`, which works out of the box.
  # Override here if you want a specific class:
  # storageClassName: longhorn
