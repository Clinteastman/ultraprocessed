apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ultraprocessed

resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  # secret.yaml is created from secret.example.yaml and gitignored.
  - secret.yaml

