apiVersion: apps/v1
kind: Deployment
metadata:
  name: ultraprocessed-backend
  namespace: ultraprocessed
  labels:
    app.kubernetes.io/name: ultraprocessed
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  # SQLite + RWO PVC: a rolling update would briefly mount the PVC twice.
  # Recreate avoids that.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ultraprocessed
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ultraprocessed
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: backend
          # Replace with your registry. The included GitHub Actions workflow
          # publishes to ghcr.io/<owner>/ultraprocessed-backend:latest.
          image: ghcr.io/clinteastman/ultraprocessed-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: ULTRAPROCESSED_DATABASE_URL
              value: "sqlite:////app/data/ultraprocessed.db"
          envFrom:
            - secretRef:
                name: ultraprocessed-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ultraprocessed-data
